async function streamChat(systemContent, userContent, onDelta, onDone) {
const base = LLM_CONFIG.apiBase.replace(/\/+$/, "");
const url = base + "/chat/completions";

const res = await fetch(url, {
method: "POST",
headers: {
"Content-Type": "application/json",
Authorization: "Bearer " + getApiKey(),
},
body: JSON.stringify({
model: LLM_CONFIG.model,
stream: true,
temperature: 0.85,
max_tokens: 1200,
thinking: LLM_CONFIG.thinking,
messages: [
{ role: "system", content: systemContent },
{ role: "user", content: userContent },
],
}),
});

if (!res.ok) {
let detail = res.status + " " + res.statusText;
try {
const err = await res.json();
detail = err.error?.message || err.message || JSON.stringify(err);
} catch (_) {}
throw new Error(detail);
}

const reader = res.body.getReader();
const decoder = new TextDecoder();
let buffer = "";
let full = "";

while (true) {
const { done, value } = await reader.read();
if (done) break;
buffer += decoder.decode(value, { stream: true });
const lines = buffer.split("\n");
buffer = lines.pop() || "";

for (const line of lines) {
const trimmed = line.trim();
if (!trimmed.startsWith("data:")) continue;
const data = trimmed.slice(5).trim();
if (data === "[DONE]") continue;
try {
const json = JSON.parse(data);
const delta = json.choices?.[0]?.delta?.content;
if (delta) {
full += delta;
onDelta(full);
}
} catch (_) {}
}
}
onDone(full);
}

return;
}

const maleName = document.getElementById("maleName").value.trim();
const femaleName = document.getElementById("femaleName").value.trim();
if (!maleName || !femaleName) {
showError("请填写男女双方的全名哦～");
return;
}

const submitBtn = document.getElementById("submitBtn");
const loading = document.getElementById("loading");
const result = document.getElementById("result");
const resultBody = document.getElementById("resultBody");

submitBtn.disabled = true;
loading.classList.add("visible");
result.classList.remove("visible");
resultBody.textContent = "";

let msgIdx = 0;
loadingInterval = setInterval(function () {
msgIdx = (msgIdx + 1) % loadingMessages.length;
document.getElementById("loadingText").textContent = loadingMessages[msgIdx];
}, 2200);

document.getElementById("namesBadge").textContent =
maleName + " ♥ " + femaleName;

const userContent =
"请为以下两位做姓名姻缘合盘（娱乐向）：\n" +
"男方全名：" +
maleName +
"\n" +
"女方全名：" +
femaleName;

const systemContent = buildSystemPrompt(maleName, femaleName);

try {
result.classList.add("visible");
await streamChat(
systemContent,
userContent,
function (full) {
resultBody.innerHTML = simpleMarkdownToHtml(full);
},
function (full) {
resultBody.innerHTML = simpleMarkdownToHtml(full);
}
);
} catch (err) {
result.classList.remove("visible");
const msg = err.message || String(err);
if (msg.includes("Failed to fetch") || msg.includes("NetworkError")) {
showError(
"网络请求失败：可能是 CORS 限制。请换用支持浏览器跨域的 API，或通过本地 HTTP 服务打开本页后再试。"
);
} else {
showError("测算失败：" + msg);
}
} finally {
clearInterval(loadingInterval);
loading.classList.remove("visible");
submitBtn.disabled = false;
}
});

createPetals();
initGate();
})();
</script>
</body>
</html>
